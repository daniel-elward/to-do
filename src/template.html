<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#10004;&#10004; My To-Do App &#10004;&#10004;</title>
</head>
<body>
    <div class="wrapper">

        <div class="controlPanel">
            
            <h1>Control Panel</h1>

            <h2>New Task</h2>
            <form name="newTask">
                
                <label for="title">Title:</label><br>
                <input type="text" id="title" name="title"><br>

                <label for="description">Description:</label><br>
                <input type="text" id="description" name="description"><br>

                <label for="dueDate">Date Due:</label><br>
                <input type="date" id="dueDate" name="dueDate"><br>

                <label for="priorityTask">High Priority:</label><br>
                <input type="checkbox" id="priorityTask" name="priorityTask"><br>
                
                <label for="notes">Notes:</label><br>
                <textarea id="notes" name="notes" rows="10" cols="40"></textarea><br>

                <button type="submit" id="addNewTaskBtn">Add Task</button>
            </form>
        </div>

            <div class="display"><h1>Display</h1></div>

    </div>
</body>
</html>
